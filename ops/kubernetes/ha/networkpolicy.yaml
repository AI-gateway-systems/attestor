apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: attestor-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: attestor-api-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: attestor-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3700
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: attestor-worker-health-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: attestor-worker
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 9808
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: attestor-runtime-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: attestor-observability
      ports:
        - protocol: TCP
          port: 4318
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 3307
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
